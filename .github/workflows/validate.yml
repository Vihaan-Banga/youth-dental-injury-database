name: Validate master.csv

# Runs the harmonization + validation pipeline on every push and PR to main.
# Fails the build if any validator check (C1-C13) reports a FAIL, or if a fresh
# harmonize does not reproduce the committed master.csv byte-for-byte.
# Does NOT regenerate visualizations (those need matplotlib which is fine but
# we don't want PR builds modifying images).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Also runs weekly to catch any drift even if nothing changed
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # No external deps: the core pipeline (harmonize + validate) is stdlib-only.

      - name: Rebuild, validate, and check reproducibility
        # run_all.py --core runs 07_harmonize -> 08_validate (validate.py exits 1 on
        # any FAIL). --check additionally fails the build if a fresh harmonize produces
        # a master.csv that differs from the committed one — so the published dataset
        # is guaranteed to reproduce byte-for-byte from the extraction CSVs.
        run: python3 scripts/run_all.py --core --check

      - name: Show validation report on failure
        if: failure()
        run: |
          echo "=== outputs/validation_report.md ==="
          cat outputs/validation_report.md

      - name: Show pipeline summary
        if: success()
        run: |
          python3 -c "
          import csv
          rows = list(csv.DictReader(open('data/harmonized/master.csv')))
          srcs = {r['source_id'] for r in rows}
          print(f'master.csv: {len(rows)} rows from {len(srcs)} sources — all validation checks passed.')
          "
