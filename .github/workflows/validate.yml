name: Validate master.csv

# Runs the harmonization + validation pipeline on every push and PR to main.
# Fails the build if validator C1-C10 checks report any FAIL.
# Does NOT regenerate visualizations (those need matplotlib which is fine but
# we don't want PR builds modifying images).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Also runs weekly to catch any drift even if nothing changed
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator dependencies
        # Only the bare minimum needed to run harmonize + validate.
        # (matplotlib / requests / pdfplumber etc. only needed for extraction-time scripts.)
        run: |
          python -m pip install --upgrade pip
          # No external deps required for harmonize.py + validate.py themselves —
          # they use stdlib csv only. Listed here for future-proofing.
          pip install --quiet --no-deps "pandas>=2.0" || true

      - name: Harmonize master.csv
        run: python3 scripts/07_harmonize.py

      - name: Validate against DATA_DICTIONARY.md
        # validate.py exits 1 if there's any FAIL — that fails this step
        # and therefore the whole workflow.
        run: python3 scripts/08_validate.py

      - name: Show validation report on failure
        if: failure()
        run: |
          echo "=== outputs/validation_report.md ==="
          cat outputs/validation_report.md

      - name: Show pipeline summary
        if: success()
        run: |
          python3 -c "
          import csv
          rows = list(csv.DictReader(open('data/harmonized/master.csv')))
          srcs = {r['source_id'] for r in rows}
          print(f'master.csv: {len(rows)} rows from {len(srcs)} sources — all validation checks passed.')
          "
